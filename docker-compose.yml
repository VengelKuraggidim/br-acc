services:
  # Neo4j
  neo4j:
    container_name: fiscal-neo4j
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512m}
      NEO4J_dbms_memory_transaction_total_max: 1G
    volumes:
      - neo4j-data:/data
      - ./infra/neo4j/import:/var/lib/neo4j/import
      - ./infra/neo4j/init.cypher:/var/lib/neo4j/init.cypher
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 15s
      timeout: 30s
      retries: 12
      start_period: 30s

  # BRACC API (camada de dados)
  bracc-api:
    container_name: fiscal-bracc-api
    build: ./api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      CORS_ORIGINS: "*"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_ENV: ${APP_ENV:-dev}
      PORT: "8000"
      PUBLIC_MODE: "true"
      PUBLIC_ALLOW_PERSON: "true"
      PUBLIC_ALLOW_ENTITY_LOOKUP: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-key-replace-in-prod-replace-in-prod}
      # Dev local lê secrets do env (NEO4J_PASSWORD/JWT_SECRET_KEY).
      # Prod (Cloud Run) NÃO seta esta var — default = gcp via Secret
      # Manager. Camadas de defesa em api/src/bracc/secrets.py impedem
      # ativação acidental em prod (whitelist APP_ENV + reject K_SERVICE).
      BRACC_SECRETS_SOURCE: env
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  # Nota historica: o service `backend` (Flask em :8001) foi removido em
  # 2026-04-18 (Fase 04.G). O FastAPI `bracc-api` agora expõe os endpoints
  # consumidos pela PWA (`/status`, `/buscar-tudo`, `/politico/{id}`) via
  # `bracc.routers.pwa_parity`. Serve o PWA via nginx em prod (ver
  # `docker-compose.prod.yml`) ou abra `pwa/index.html` direto em dev.

  # ETL - todos os pipelines (run manualmente)
  etl:
    container_name: fiscal-etl
    build: ./etl
    profiles: ["etl"]
    working_dir: /workspace
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      PYTHONUNBUFFERED: "1"
      UV_PROJECT_ENVIRONMENT: /opt/venv
    volumes:
      - .:/workspace
    depends_on:
      neo4j:
        condition: service_healthy

  # ETL GO - roda apenas os 5 pipelines de Goias
  etl-go:
    container_name: fiscal-etl-go
    build: ./etl
    profiles: ["etl-go"]
    working_dir: /workspace
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      PYTHONUNBUFFERED: "1"
      UV_PROJECT_ENVIRONMENT: /opt/venv
    volumes:
      - .:/workspace
    depends_on:
      neo4j:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        cd /workspace/etl
        echo "=== Carregando dados de Goias (venv em /opt/venv, ja instalada na imagem) ==="
        echo "[1/5] Folha de pagamento GO..."
        uv run python -m bracc_etl.runner run --source folha_go --neo4j-password $$NEO4J_PASSWORD --data-dir /workspace/data || echo "WARN: folha_go falhou"
        echo "[2/5] Financas municipais GO..."
        uv run python -m bracc_etl.runner run --source tcm_go --neo4j-password $$NEO4J_PASSWORD --data-dir /workspace/data || echo "WARN: tcm_go falhou"
        echo "[3/5] Licitacoes GO..."
        uv run python -m bracc_etl.runner run --source pncp_go --neo4j-password $$NEO4J_PASSWORD --data-dir /workspace/data || echo "WARN: pncp_go falhou"
        echo "[4/5] Diarios oficiais GO..."
        uv run python -m bracc_etl.runner run --source querido_diario_go --neo4j-password $$NEO4J_PASSWORD --data-dir /workspace/data || echo "WARN: querido_diario_go falhou"
        echo "[5/5] Camara de Goiania..."
        uv run python -m bracc_etl.runner run --source camara_goiania --neo4j-password $$NEO4J_PASSWORD --data-dir /workspace/data || echo "WARN: camara_goiania falhou"
        echo "=== Carga de Goias concluida ==="

volumes:
  neo4j-data:
    external: true
    name: br-acc_neo4j-data
  etl-data:
