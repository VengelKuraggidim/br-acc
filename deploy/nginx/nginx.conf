server {
    listen 80;
    server_name _;

    # Frontend estático
    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # API FastAPI bracc (consolidada em 2026-04-18 — antes passava por
    # um Flask intermediário em backend:8001, hoje deletado).
    location /api/ {
        proxy_pass http://bracc-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Archival content-addressed (docs/archival.md) — cópias preservadas das
    # fontes públicas. Arquivos content-addressed por sha256, imutáveis →
    # cache agressivo OK. autoindex off pra não expor lista de arquivos.
    location /archival/ {
        alias /var/lib/archival/;
        autoindex off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Frontend PWA - tudo que não é /api vai pro index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
