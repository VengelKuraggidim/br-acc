# Instância Neo4j de demonstração — cópia reduzida do grafo principal.
#
# Roda em paralelo ao `fiscal-neo4j` (portas 7687/7474) sem conflito:
# usa portas 7688 (bolt) e 7475 (browser), volume separado
# `fiscal-neo4j-demo-data`.
#
# Uso:
#   1. Setar NEO4J_DEMO_PASSWORD em .env (ou exportar antes):
#        echo "NEO4J_DEMO_PASSWORD=demo-$(openssl rand -hex 16)" >> .env
#   2. Subir:
#        docker compose -f docker-compose.demo.yml up -d
#   3. Rodar build:
#        cd etl && uv run python ../scripts/build_demo_graph.py \
#          --source-password "$NEO4J_PASSWORD" \
#          --target-password "$NEO4J_DEMO_PASSWORD" \
#          --wipe-target
#   4. Abrir browser: http://localhost:7475 (user neo4j)
#   5. Export pra Aura Free:
#        docker exec fiscal-neo4j-demo neo4j-admin database dump neo4j \
#          --to-path=/data/dumps
#
# Limpar destino: docker compose -f docker-compose.demo.yml down -v
services:
  neo4j-demo:
    container_name: fiscal-neo4j-demo
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_DEMO_PASSWORD:?NEO4J_DEMO_PASSWORD obrigatorio}
      NEO4J_PLUGINS: '["apoc"]'
      # Demo tem <200k nodes — memória baixa chega sobrando.
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
      NEO4J_dbms_memory_transaction_total_max: 512m
    volumes:
      - neo4j-demo-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_DEMO_PASSWORD}", "RETURN 1"]
      interval: 15s
      timeout: 30s
      retries: 12
      start_period: 30s

volumes:
  neo4j-demo-data:
    name: fiscal-neo4j-demo-data
