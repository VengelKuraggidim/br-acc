services:
  # === Neo4j (banco de grafos) ===
  neo4j:
    container_name: fiscal-neo4j
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-1G}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-2G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-1G}
      NEO4J_dbms_memory_transaction_total_max: 1G
    volumes:
      - neo4j-data:/data
      - ./infra/neo4j/import:/var/lib/neo4j/import
      - ./infra/neo4j/init.cypher:/var/lib/neo4j/init.cypher
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 15s
      timeout: 30s
      retries: 12
      start_period: 30s

  # === BRACC API (dados brutos) ===
  bracc-api:
    container_name: fiscal-bracc-api
    build: ./api
    restart: unless-stopped
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      APP_ENV: ${APP_ENV:-production}
      PUBLIC_MODE: "true"
      PUBLIC_ALLOW_PERSON: "true"
      PUBLIC_ALLOW_ENTITY_LOOKUP: "true"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  # === Backend Fiscal Cidadão (nossa API) ===
  backend:
    container_name: fiscal-backend
    build: ./backend
    restart: unless-stopped
    environment:
      BRACC_API_URL: http://bracc-api:8000
      TRANSPARENCIA_API_KEY: ${TRANSPARENCIA_API_KEY:-}
    depends_on:
      bracc-api:
        condition: service_healthy

  # === Nginx (PWA + reverse proxy) ===
  nginx:
    container_name: fiscal-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./pwa:/usr/share/nginx/html:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - backend

  # === Certbot (HTTPS grátis) ===
  certbot:
    container_name: fiscal-certbot
    image: certbot/certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"

  # === ETL (rodar manualmente quando precisar) ===
  etl:
    build: ./etl
    profiles: ["etl"]
    working_dir: /workspace
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/workspace
    depends_on:
      neo4j:
        condition: service_healthy

  # === ETL GO - Run all Goias pipelines ===
  etl-go:
    build: ./etl
    profiles: ["etl-go"]
    working_dir: /workspace
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/workspace
    depends_on:
      neo4j:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        cd /workspace/etl
        uv sync --no-dev
        echo "=== Carregando dados de Goias ==="
        for src in folha_go tcm_go pncp_go querido_diario_go camara_goiania; do
          echo ">>> $$src"
          uv run python -m bracc_etl.runner run --source $$src --neo4j-password $$NEO4J_PASSWORD --data-dir /workspace/data || echo "WARN: $$src falhou"
        done
        echo "=== Carga de Goias concluida ==="

volumes:
  neo4j-data:
  certbot-conf:
  certbot-www:
