name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRODUCT_TIER: community
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-api-${{ hashFiles('api/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-api-

      - name: Run quality suite
        run: ../scripts/ci/python_quality.sh

  etl:
    name: ETL (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-etl-${{ hashFiles('etl/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-etl-

      - name: Run quality suite
        run: ../scripts/ci/python_quality.sh

  neutrality:
    name: Neutrality Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check for banned words
        run: make neutrality

  governance:
    name: Registry & Docs Governance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check public claims (README + data-sources summary)
        run: make check-public-claims

      - name: Check pipeline contracts (registry ⇆ runner)
        run: make check-pipeline-contracts

      - name: Check pipeline inputs (registry ⇆ pipeline_status doc)
        run: make check-pipeline-inputs

      - name: Check bootstrap-all contract (registry ⇆ contract yml)
        run: make check-bootstrap-contract

      - name: Check provenance contract (GO pipelines call attach_provenance)
        run: make check-provenance-contract

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [api, etl]
    if: github.ref == 'refs/heads/main' && vars.ENABLE_INTEGRATION_TESTS == 'true'
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-integration-${{ hashFiles('api/uv.lock', 'etl/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-integration-

      - name: API integration tests
        run: cd api && uv sync --extra dev && uv run pytest -m integration
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_PASSWORD: testpassword

      - name: ETL integration tests
        run: cd etl && uv sync --extra dev && uv run pytest -m integration
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_PASSWORD: testpassword
